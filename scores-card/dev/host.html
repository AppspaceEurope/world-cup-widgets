<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Card mock host — World Cup Live Scores</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font: 14px/1.4 -apple-system, Segoe UI, Roboto, sans-serif; background: #1b2336; color: #e2e8f0; }
    header { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; padding: 10px 16px; background: #111827; border-bottom: 1px solid #334155; }
    header strong { font-weight: 700; }
    .group { display: flex; gap: 6px; align-items: center; }
    .group label { color: #94a3b8; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    button { font: inherit; padding: 5px 11px; border-radius: 6px; border: 1px solid #475569; background: #1f2937; color: #e2e8f0; cursor: pointer; }
    button.on { background: #2563eb; border-color: #2563eb; color: #fff; }
    .stage { display: grid; place-items: center; padding: 28px; min-height: calc(100vh - 52px); }
    .frame { box-shadow: 0 10px 50px rgba(0,0,0,.5); border-radius: 8px; overflow: hidden; background: #000; resize: both; }
    .frame iframe { display: block; width: 100%; height: 100%; border: 0; }
    .dims { color: #94a3b8; font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <strong>Card mock host</strong>
    <div class="group" id="aspects">
      <label>Aspect</label>
      <button data-w="1024" data-h="576">16:9</button>
      <button data-w="360" data-h="640">9:16</button>
      <button data-w="700" data-h="394">16:9 wide</button>
      <button data-w="360" data-h="250">compact</button>
    </div>
    <div class="group" id="mocks">
      <label>Data</label>
      <button data-mock="">live ESPN</button>
      <button data-mock="live">mock: live</button>
      <button data-mock="group-stage">mock: mixed</button>
      <button data-mock="empty">mock: empty</button>
    </div>
    <span class="dims" id="dims"></span>
  </header>
  <div class="stage">
    <div class="frame" id="frame"><iframe id="card" title="card"></iframe></div>
  </div>

  <script>
    var state = { w: 1024, h: 576, mock: 'live' };
    var frame = document.getElementById('frame');
    var card = document.getElementById('card');
    var dims = document.getElementById('dims');

    function load() {
      frame.style.width = state.w + 'px';
      frame.style.height = state.h + 'px';
      dims.textContent = state.w + ' × ' + state.h;
      var q = state.mock ? ('?mock=' + state.mock) : '';
      card.src = '/index.html' + q + (q ? '&' : '?') + 't=' + Date.now();
    }

    function wire(groupId, key, apply) {
      var g = document.getElementById(groupId);
      g.addEventListener('click', function (e) {
        var b = e.target.closest('button'); if (!b) return;
        [].forEach.call(g.querySelectorAll('button'), function (x) { x.classList.remove('on'); });
        b.classList.add('on');
        apply(b); load();
      });
    }
    wire('aspects', 'w', function (b) { state.w = +b.dataset.w; state.h = +b.dataset.h; });
    wire('mocks', 'mock', function (b) { state.mock = b.dataset.mock; });

    // Card → host handshake: when the card says it's ready, send a sample api.init
    // (exercises the host-config path: a title + accent the user "set" in the editor).
    window.addEventListener('message', function (ev) {
      if (ev.data && ev.data.message === 'onapiready') {
        card.contentWindow.postMessage({
          message: 'api.init',
          config: { model: { inputs: [
            { name: 'title', value: 'World Cup 2026' },
            { name: 'accentColor', value: '#7c3aed' }
          ] } }
        }, '*');
      }
    });

    // Default selection
    document.querySelector('#aspects button').classList.add('on');
    document.querySelector('#mocks [data-mock="live"]').classList.add('on');
    load();
  </script>
</body>
</html>
